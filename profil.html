<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Profil - NexFormation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --success: #2EE89A;
      --warning: #FFD166;
      --danger: #FF4D6D;
      --shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.9);
      --shadow-glow: 0 0 40px rgba(183, 110, 255, 0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
      --glass-border: rgba(183, 110, 255, 0.07);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
        linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%);
      top: -100px; left: -100px;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%);
      bottom: 20%; right: -80px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #D4A1FF, #B76EFF, #8B3FE8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: nexusGlow 3s ease-in-out infinite;
    }

    @keyframes nexusGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 10px rgba(183, 110, 255, 0.6)); }
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
    }

    .logo-text span { color: var(--primary); }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-btn:active {
      background: rgba(183, 110, 255, 0.12);
      transform: scale(0.95);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== PROFIL HEADER ===== */
    .profile-header {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .profile-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(183, 110, 255, 0.4), transparent);
    }

    /* ===== PHOTO DE PROFIL AVEC UPLOAD ===== */
    .profile-avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 15px;
      cursor: pointer;
    }

    .profile-avatar-large {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 700;
      color: white;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 1), 0 0 0 5px rgba(183, 110, 255, 0.3), 0 0 20px rgba(183, 110, 255, 0.2);
      object-fit: cover;
    }

    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .camera-icon {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 14px;
      border: 2px solid var(--bg-dark);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .camera-icon:active {
      transform: scale(0.9);
    }

    #profilePhotoInput {
      display: none;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 5px;
      letter-spacing: -0.3px;
    }

    .profile-email {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .profile-phone {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .member-since {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 10px;
    }

    .access-badge {
      display: inline-block;
      background: rgba(46, 232, 154, 0.1);
      border: 1px solid rgba(46, 232, 154, 0.3);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 15px;
    }

    .access-badge i {
      margin-right: 5px;
    }

    /* ===== STATISTIQUES - UNIQUEMENT FORMATIONS ===== */
    .stats-grid {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-width: 180px;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(183, 110, 255, 0.4), transparent);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* ===== MENU ===== */
    .menu-list {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px;
      border-bottom: 1px solid rgba(183, 110, 255, 0.05);
      text-decoration: none;
      color: var(--text-light);
      transition: all 0.3s ease;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: rgba(183, 110, 255, 0.05);
    }

    .menu-icon {
      width: 44px;
      height: 44px;
      background: rgba(183, 110, 255, 0.08);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--primary);
    }

    .menu-content {
      flex: 1;
    }

    .menu-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .menu-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    .menu-arrow {
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ===== BOUTON DÉCONNEXION ===== */
    .logout-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 77, 109, 0.08);
      border: 1px solid rgba(255, 77, 109, 0.25);
      border-radius: 16px;
      color: var(--danger);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logout-btn:active {
      background: rgba(255, 77, 109, 0.15);
      transform: scale(0.98);
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: rgba(8, 8, 20, 0.97);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 18px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      z-index: 1100;
      transform: translateY(120px);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 42px;
      height: 42px;
      background: rgba(183, 110, 255, 0.15);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 18px;
    }

    .notification-content h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .notification.error {
      border-color: var(--danger);
    }

    .notification.error .notification-icon {
      background: var(--danger);
      color: white;
    }

    .notification.success {
      border-color: var(--success);
    }

    .notification.success .notification-icon {
      background: var(--success);
      color: black;
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-info"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Notification</h4>
      <p id="notificationMessage">Message</p>
    </div>
  </div>

  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">NEX<span>FORMATION</span></div>
    </a>
    <a href="index.html" class="back-btn">
      <i class="fas fa-home"></i>
    </a>
  </header>

  <main class="container">
    
    <div class="profile-header">
      <div class="profile-avatar-container" onclick="document.getElementById('profilePhotoInput').click()">
        <div class="profile-avatar-large" id="profileAvatar">
          <span id="avatarLetter">U</span>
        </div>
        <div class="camera-icon">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      <input type="file" id="profilePhotoInput" accept="image/*" style="display: none;">
      
      <h1 class="profile-name" id="profileName">Chargement...</h1>
      <p class="profile-email" id="profileEmail">chargement...</p>
      <p class="profile-phone" id="profilePhone"></p>
      <p class="member-since" id="memberSince"></p>
      
      <div id="paidBadge" style="display: none;">
        <div class="access-badge">
          <i class="fas fa-crown"></i> Accès illimité à vie
        </div>
      </div>
    </div>

    <!-- ===== STATISTIQUES ===== -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="coursesCompleted">0</div>
        <div class="stat-label">Formations suivies</div>
      </div>
    </div>

    <div class="menu-list">
      <a href="mes-formations.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-book-open"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Mes formations</div>
          <div class="menu-subtitle">Voir mes formations en cours</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <a href="parametres.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-cog"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Paramètres</div>
          <div class="menu-subtitle">Modifier mon profil</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <a href="support.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-headset"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Support</div>
          <div class="menu-subtitle">Aide et assistance</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>
    </div>

    <button class="logout-btn" onclick="window.logout()">
      <i class="fas fa-sign-out-alt"></i>
      Se déconnecter
    </button>

  </main>

  <script type="module">
    // ============================================
    // CONFIGURATION FIREBASE CORRECTE (nexformation-ebcc0)
    // ============================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

    // ✅ Configuration CORRECTE (la même que register.html et index.html)
    const firebaseConfig = {
      apiKey: "AIzaSyBWTEWAQjQuDzY26BghtTcqfdyVEmQZXe8",
      authDomain: "nexformation-ebcc0.firebaseapp.com",
      databaseURL: "https://nexformation-ebcc0-default-rtdb.firebaseio.com",
      projectId: "nexformation-ebcc0",
      storageBucket: "nexformation-ebcc0.firebasestorage.app",
      messagingSenderId: "592625968577",
      appId: "1:592625968577:web:53482aea0414983427bb40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let notificationTimer = null;
    let currentUser = null;
    let userData = null;

    function showNotification(title, message, type = 'info') {
      const notification = document.getElementById('notification');
      const notificationTitle = document.getElementById('notificationTitle');
      const notificationMessage = document.getElementById('notificationMessage');
      const icon = notification.querySelector('.notification-icon i');

      notificationTitle.textContent = title;
      notificationMessage.textContent = message;

      notification.className = 'notification show';
      if (type === 'error') {
        notification.classList.add('error');
        icon.className = 'fas fa-exclamation-triangle';
      } else if (type === 'success') {
        notification.classList.add('success');
        icon.className = 'fas fa-check-circle';
      } else {
        icon.className = 'fas fa-info';
      }

      if (notificationTimer) clearTimeout(notificationTimer);
      notificationTimer = setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    async function loadUserData() {
      if (!currentUser) return;
      
      try {
        const userRef = doc(db, "users", currentUser.uid);
        const userDoc = await getDoc(userRef);
        
        if (userDoc.exists()) {
          userData = userDoc.data();
          
          // Afficher le nom
          document.getElementById('profileName').textContent = userData.name || 'Utilisateur';
          document.getElementById('profileEmail').textContent = userData.email || currentUser.email;
          document.getElementById('avatarLetter').textContent = (userData.name || 'U').charAt(0).toUpperCase();
          
          // Afficher le téléphone (corrigé: telephone au lieu de phone)
          if (userData.telephone) {
            document.getElementById('profilePhone').innerHTML = '<i class="fas fa-phone"></i> ' + userData.telephone;
          } else {
            document.getElementById('profilePhone').style.display = 'none';
          }
          
          // Date d'inscription
          if (userData.createdAt) {
            const date = new Date(userData.createdAt);
            const formattedDate = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('memberSince').innerHTML = '<i class="fas fa-calendar-alt"></i> Membre depuis ' + formattedDate;
          }
          
          // Nombre de formations suivies
          const coursesCount = userData.courses?.length || 0;
          document.getElementById('coursesCompleted').textContent = coursesCount;
          
          // Badge payant
          if (userData.fullAccess) {
            document.getElementById('paidBadge').style.display = 'block';
          }
          
          // Charger la photo de profil si elle existe
          if (userData.profilePhoto) {
            const avatarDiv = document.getElementById('profileAvatar');
            avatarDiv.innerHTML = `<img src="${userData.profilePhoto}" alt="Photo de profil" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
          }
        } else {
          console.log("Document utilisateur non trouvé dans Firestore");
          document.getElementById('profileName').textContent = currentUser.displayName || 'Utilisateur';
          document.getElementById('profileEmail').textContent = currentUser.email;
          document.getElementById('avatarLetter').textContent = (currentUser.displayName || 'U').charAt(0).toUpperCase();
        }
      } catch (error) {
        console.error("Erreur chargement profil:", error);
        showNotification('Erreur', 'Impossible de charger les données du profil', 'error');
      }
    }

    async function uploadProfilePhoto(file) {
      if (!currentUser) return;
      
      try {
        showNotification('Upload', 'Téléchargement en cours...', 'info');
        
        const storageRef = ref(storage, `profile_photos/${currentUser.uid}`);
        await uploadBytes(storageRef, file);
        const photoURL = await getDownloadURL(storageRef);
        
        const userRef = doc(db, "users", currentUser.uid);
        await updateDoc(userRef, { profilePhoto: photoURL });
        
        const avatarDiv = document.getElementById('profileAvatar');
        avatarDiv.innerHTML = `<img src="${photoURL}" alt="Photo de profil" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
        
        showNotification('Succès', 'Photo de profil mise à jour !', 'success');
      } catch (error) {
        console.error("Erreur upload:", error);
        showNotification('Erreur', "Impossible de télécharger la photo", 'error');
      }
    }

    // ============================================
    // ÉCOUTEUR CHANGEMENT PHOTO
    // ============================================
    document.getElementById('profilePhotoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        // Limiter la taille à 5MB
        if (file.size > 5 * 1024 * 1024) {
          showNotification('Erreur', 'L\'image ne doit pas dépasser 5 Mo', 'error');
          return;
        }
        uploadProfilePhoto(file);
      } else if (file) {
        showNotification('Erreur', 'Veuillez sélectionner une image valide', 'error');
      }
    });

    // ============================================
    // DÉCONNEXION
    // ============================================
    window.logout = async function() {
      try {
        await signOut(auth);
        localStorage.removeItem('NexFormation_current_user');
        showNotification('Déconnexion', 'À bientôt sur NexFormation !', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (error) {
        console.error(error);
        showNotification('Erreur', 'Erreur lors de la déconnexion', 'error');
      }
    };

    // ============================================
    // AUTHENTIFICATION
    // ============================================
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        localStorage.setItem('NexFormation_current_user', user.uid);
        await loadUserData();
      } else {
        // Vérifier si un utilisateur était sauvegardé localement
        const savedUid = localStorage.getItem('NexFormation_current_user');
        if (savedUid) {
          localStorage.removeItem('NexFormation_current_user');
        }
        // Rediriger vers login
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
