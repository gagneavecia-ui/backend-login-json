<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - NexFormation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES - NEXFORMATION EDITION ===== */
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --primary-glow: rgba(183, 110, 255, 0.35);
      --bg-dark: #030305;
      --bg-medium: #08080F;
      --bg-light: #0F0F1A;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(15, 15, 26, 0.85);
      --card-border: rgba(183, 110, 255, 0.08);
      --card-border-hover: rgba(183, 110, 255, 0.25);
      --success: #2EE89A;
      --warning: #FFD166;
      --danger: #FF4D6D;
      --shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.9);
      --shadow-glow: 0 0 40px rgba(183, 110, 255, 0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-bg: rgba(183, 110, 255, 0.04);
      --glass-border: rgba(183, 110, 255, 0.07);
      --grain-opacity: 0.035;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      position: relative;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ===== GRAIN TEXTURE OVERLAY ===== */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139, 63, 232, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183, 110, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(8, 8, 20, 0.6) 0%, transparent 80%),
        linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139, 63, 232, 0.15), transparent 70%);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(183, 110, 255, 0.1), transparent 70%);
      bottom: 20%; right: -80px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      background: rgba(3, 3, 5, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(183, 110, 255, 0.07);
      box-shadow: 0 1px 30px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: transparent;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 50%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      animation: nexusGlow 3s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes nexusGlow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 0px rgba(183, 110, 255, 0)); }
      50% { filter: brightness(1.3) drop-shadow(0 0 10px rgba(183, 110, 255, 0.6)); }
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-light);
      text-transform: uppercase;
      font-style: italic;
    }

    .logo-text span {
      color: var(--primary);
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .back-btn:active {
      background: rgba(183, 110, 255, 0.12);
      border-color: var(--primary);
      transform: scale(0.95);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 30px 20px;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(183, 110, 255, 0.4), rgba(139, 63, 232, 0.4), transparent);
    }

    .auth-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .auth-title span {
      background: linear-gradient(135deg, var(--primary-light), var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-subtitle {
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .form-input {
      width: 100%;
      padding: 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      color: var(--text-light);
      font-size: 15px;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(183, 110, 255, 0.1);
      background: rgba(0, 0, 0, 0.7);
    }

    .form-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .remember-me input {
      accent-color: var(--primary);
    }

    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }

    .forgot-password:active {
      opacity: 0.7;
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .auth-btn:active {
      transform: scale(0.98);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--text-dim);
      font-size: 12px;
      margin: 20px 0;
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(183, 110, 255, 0.08);
    }

    .auth-footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .auth-footer a:active {
      opacity: 0.7;
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: rgba(8, 8, 20, 0.97);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 18px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      z-index: 1100;
      transform: translateY(120px);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, rgba(183, 110, 255, 0.2), rgba(139, 63, 232, 0.12));
      border-radius: 14px;
      border: 1px solid rgba(183, 110, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 18px;
      flex-shrink: 0;
    }

    .notification-content h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .notification.error {
      border-color: var(--danger);
    }

    .notification.error .notification-icon {
      background: var(--danger);
      color: white;
    }

    .notification.success {
      border-color: var(--success);
    }

    .notification.success .notification-icon {
      background: var(--success);
      color: black;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-info"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Notification</h4>
      <p id="notificationMessage">Message</p>
    </div>
  </div>

  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">NEX<span>FORMATION</span></div>
    </a>
    
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i>
    </a>
  </header>

  <main class="container">
    <div class="auth-card">
      <h1 class="auth-title">
        Bienvenue <span>NexFormation</span>
      </h1>
      <p class="auth-subtitle">
        Connectez-vous pour accéder à vos formations
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="exemple@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember"> Se souvenir de moi
          </label>
          <span class="forgot-password" onclick="showForgotMessage()">Mot de passe oublié ?</span>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          Se connecter
        </button>
      </form>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span>OU</span>
        <div class="auth-divider-line"></div>
      </div>

      <div class="auth-footer">
        Pas encore de compte ? <a href="register.html">S'inscrire</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApqCllug-lRe5iHa6Yimor61JIke7mYOc",
      authDomain: "earnzone-70680.firebaseapp.com",
      projectId: "earnzone-70680",
      storageBucket: "earnzone-70680.firebasestorage.app",
      messagingSenderId: "50852812524",
      appId: "1:50852812524:web:f7e8245e5b247ab8e077c9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let notificationTimer = null;

    function showNotification(title, message, type = 'info') {
      const notification = document.getElementById('notification');
      const notificationTitle = document.getElementById('notificationTitle');
      const notificationMessage = document.getElementById('notificationMessage');
      const icon = notification.querySelector('.notification-icon i');

      notificationTitle.textContent = title;
      notificationMessage.textContent = message;

      notification.className = 'notification show';
      if (type === 'error') {
        notification.classList.add('error');
        icon.className = 'fas fa-exclamation-triangle';
      } else if (type === 'success') {
        notification.classList.add('success');
        icon.className = 'fas fa-check-circle';
      } else {
        icon.className = 'fas fa-info';
      }

      if (notificationTimer) clearTimeout(notificationTimer);
      notificationTimer = setTimeout(() => {
        notification.classList.remove('show');
      }, 4000);
    }

    window.showForgotMessage = function() {
      showNotification('Information', 'Veuillez contacter le support pour réinitialiser votre mot de passe', 'info');
    }

    async function loginUser(event) {
      event.preventDefault();

      const loginBtn = document.getElementById('loginBtn');
      const originalContent = loginBtn.innerHTML;
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!email || !password) {
        showNotification('Erreur', 'Veuillez remplir tous les champs', 'error');
        return;
      }

      loginBtn.innerHTML = '<span class="loader"></span> Connexion...';
      loginBtn.disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        if (remember) {
          localStorage.setItem('NexFormation_remembered_email', email);
        } else {
          localStorage.removeItem('NexFormation_remembered_email');
        }
        
        localStorage.setItem('NexFormation_current_user', user.uid);
        
        showNotification('Succès', 'Connexion réussie ! Redirection...', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
        
      } catch (error) {
        console.error(error);
        let errorMessage = "Erreur lors de la connexion";
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = "Aucun compte associé à cet email";
            break;
          case 'auth/wrong-password':
            errorMessage = "Mot de passe incorrect";
            break;
          case 'auth/invalid-email':
            errorMessage = "Adresse email invalide";
            break;
          case 'auth/too-many-requests':
            errorMessage = "Trop de tentatives. Réessayez plus tard";
            break;
          default:
            errorMessage = error.message;
        }
        showNotification('Erreur', errorMessage, 'error');
      } finally {
        loginBtn.innerHTML = originalContent;
        loginBtn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = localStorage.getItem('NexFormation_current_user');
      if (currentUser) {
        window.location.href = 'index.html';
        return;
      }

      const rememberedEmail = localStorage.getItem('NexFormation_remembered_email');
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('remember').checked = true;
      }

      const form = document.getElementById('loginForm');
      form.addEventListener('submit', loginUser);
    });
  </script>
</body>
</html>
